name: Build Debug APK

# Triggers: every push to any branch, and manual trigger from the Actions tab
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # lets you click "Run workflow" manually in the Actions tab

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (required for AGP 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Set up Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 4. Grant execute permission to gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Cache Gradle dependencies (speeds up subsequent builds)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 6. Build the debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. Upload the APK as a downloadable artifact
      #    Go to: Actions tab → click the latest run → scroll to Artifacts section
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ODE-Rom-Manager-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # artifact stays downloadable for 30 days

      # Optional: print APK info for confirmation
      - name: Show APK info
        run: |
          echo "=== Build complete ==="
          ls -lh app/build/outputs/apk/debug/
          echo "Download the APK from the Artifacts section above."
